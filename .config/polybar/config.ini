[global/wm]
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/base]
bottom = false

width = 100%
height = 24px

background = ${color.bg}
foreground = ${color.white}

border-color = ${color.white}
;border-top-size = 1
border-bottom-size = 1

separator = |
separator-foreground = ${color.black}

; Font
font-0 = Ubuntu:size=10;2
; Gliph (Japan & Chinese)
font-1 = M+ 1mn:style=Regular:size=10;2
; Icons
font-2 = Font Awesome 6 Free:style=Solid:size=8;2
; Emoji
font-3 = Noto Color Emoji:pixelsize=16:style=Regular:scale=10;2

module-margin-right = 6px
module-margin-left = 6px

padding-left = 6px
padding-right = 6px

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${color.bg} 
tray-margin = 0

underline-color = ${color.white}
underline-size = 3

enable-ipc = true

[bar/main]
inherit = bar/base

monitor = HDMI-0

modules-left = i3
modules-center = xwindow
modules-right = updates github network cpu memory date xkeyboard

[bar/secondary]
inherit = bar/base

monitor = DP-0

modules-left = i3
modules-center = xwindow
modules-right = xkeyboard
